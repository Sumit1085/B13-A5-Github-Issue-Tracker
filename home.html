<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker | Home</title>
    <!-- Diazy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- FOnt Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- Css -->
      <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl"><img class="w-9" src="./assets/github-logo.png" alt="">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <input type="text" class="rounded-sm border-[#bdc3c7] pl-4" placeholder=" Search issues..." class="input input-bordered w-24 md:w-auto" />
            <button class="btn btn-primary"> + New Issue</button>
        </div>
    </div>


    <main class="bg-[#F8FAFC]">
        <div class="mx-auto container py-8">
            <div id="buttons" class="buttons bg-white p-8 space-x-2 shadow rounded-lg">
                <button onclick="buttonClick(this)" class="btn button btn-primary w-1/10">All</button>
                <button onclick="buttonClick(this)" class="btn btn-outline button w-1/10">Open</button>
                <button onclick="buttonClick(this)" class="btn button w-1/10">Closed</button>
            </div>

            <div class="tracker mt-4 bg-white p-8 flex justify-between items-center rounded-lg shadow">
                <div class="tracker-left flex items-center gap-2">
                    <div class="tracker-img">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="tracker-info">
                        <h2 class="text-xl font-semibold"><span id="totalIssue"></span> Issues</h2>
                        <p class="text-[16px] font-normal text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="tracker-right flex gap-4 items-center">
                    <p><i class="fa-solid fa-circle text-[#00A96E]"></i>  Open</p>
                    <p><i class="fa-solid fa-circle text-[#A855F7]"></i>  Closed</p>
                </div>
            </div>

            <div id="cards-container" class="p-5 mt-5 bg-white grid grid-cols-4 shadow space-y-2">

                <!-- Dynamic api data load -->

               
            </div>
            
        </div>

        <!-- Modal -->
        
     </main>

     <script src="./script/home.js"></script>
</body>
</html>
