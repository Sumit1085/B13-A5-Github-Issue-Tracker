<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <!-- Diazy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- FOnt Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- Css -->
      <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="flex flex-col items-center">
        <fieldset class="fieldset bg-base-200 border-base-300  rounded-box w-xs border p-4 mx-auto">
                <div class="card-info mx-auto text-center">
                    <img class="mx-auto" src="./assets/github-logo.png" alt="">
                    <h1 class="mt-6 text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
                    <p class="mt-1 text-[#64748B]">Sign in to manage your issues</p>
                </div>

                <label class="label text-[16px] mt-6 text-[#1F2937] font-medium">Username</label>
                <input id="username" type="email" class="input" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default: admin</p>
                

                <label class="label text-[16px] mt-4 text-[#1F2937] font-medium">Password</label>
                <input id="password" type="password" class="input" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Default: admin123 </p>
                <button id="signIn" class="btn btn-primary rounded-[8px] mt-4">Sign In</button>
                 <p class="text-center mt-3 text-[16px]">Or</p>
                 <div class="text-center">
                    <p class="text-sm  text-[#64748B]">Demo Credentials:</p>
                    <p class="mt-3 text-[16px]"><span class="font-semibold">Username:</span> admin</p>

                    <p class="mt-1 text-[16px]"><span class="font-semibold">Password:</span>: admin123</p>
                 </div>
        </fieldset>
    </main>





    <script src="./script/index.js"></script>
</body>
</html>
